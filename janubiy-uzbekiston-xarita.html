<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Janubiy O'zbekiston — Antik Davr Yodgorliklari</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@300;400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --ink:    #1a1208;
    --gold:   #c9a84c;
    --gold2:  #e8c97a;
    --parch:  #f5ede0;
    --smoke:  #2b1f0e;
    --clay:   #8b4a2b;
    --panel:  rgba(20,13,5,0.96);
  }

  body {
    background: var(--ink);
    font-family: 'Lora', serif;
    color: var(--parch);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(90deg, #0e0904 0%, #1f1508 50%, #0e0904 100%);
    border-bottom: 1px solid var(--gold);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    position: relative;
    z-index: 1000;
  }
  header::before {
    content: '';
    position: absolute; inset: 0;
    background: repeating-linear-gradient(90deg, transparent, transparent 60px, rgba(201,168,76,0.04) 60px, rgba(201,168,76,0.04) 61px);
    pointer-events: none;
  }
  .header-icon { font-size: 28px; flex-shrink: 0; }
  .header-text h1 {
    font-family: 'Cinzel', serif;
    font-size: 16px;
    font-weight: 700;
    color: var(--gold2);
    letter-spacing: 0.08em;
    line-height: 1.2;
  }
  .header-text p {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(245,237,224,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .legend {
    margin-left: auto;
    display: flex;
    gap: 14px;
    align-items: center;
  }
  .leg-item {
    display: flex; align-items: center; gap: 6px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    color: rgba(245,237,224,0.6);
    letter-spacing: 0.08em;
  }
  .leg-dot { width: 10px; height: 10px; border-radius: 50%; border: 2px solid; }

  /* ── LAYOUT ── */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* ── MAP ── */
  #map {
    flex: 1;
    z-index: 1;
    cursor: crosshair;
  }

  /* Leaflet overrides */
  .leaflet-container { background: #1a1208; }
  .leaflet-tile { filter: sepia(0.6) saturate(0.7) brightness(0.75) hue-rotate(5deg); }
  .leaflet-control-zoom a {
    background: var(--panel) !important;
    color: var(--gold) !important;
    border-color: rgba(201,168,76,0.3) !important;
    font-family: 'Inter', sans-serif !important;
  }
  .leaflet-control-zoom a:hover { background: #2b1f0e !important; }
  .leaflet-control-attribution { display: none; }

  /* ── CUSTOM MARKER ── */
  .marker-outer {
    width: 36px; height: 36px;
    border-radius: 50% 50% 50% 0;
    transform: rotate(-45deg);
    border: 2px solid var(--gold);
    box-shadow: 0 0 12px rgba(201,168,76,0.5), 0 2px 8px rgba(0,0,0,0.6);
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    display: flex; align-items: center; justify-content: center;
  }
  .marker-outer.active {
    box-shadow: 0 0 22px rgba(201,168,76,0.9), 0 2px 12px rgba(0,0,0,0.8);
    border-color: var(--gold2);
  }
  .marker-inner {
    transform: rotate(45deg);
    font-size: 14px;
    line-height: 1;
  }

  /* ── SIDE PANEL ── */
  #panel {
    width: 0;
    background: var(--panel);
    border-left: 1px solid rgba(201,168,76,0.2);
    overflow: hidden;
    transition: width 0.35s cubic-bezier(.4,0,.2,1);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 500;
  }
  #panel.open { width: 380px; }

  .panel-inner {
    width: 380px;
    height: 100%;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: rgba(201,168,76,0.3) transparent;
  }
  .panel-inner::-webkit-scrollbar { width: 4px; }
  .panel-inner::-webkit-scrollbar-thumb { background: rgba(201,168,76,0.3); border-radius: 2px; }

  /* close btn */
  .close-btn {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px;
    background: rgba(201,168,76,0.1);
    border: 1px solid rgba(201,168,76,0.3);
    color: var(--gold);
    border-radius: 50%;
    font-size: 14px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s;
    z-index: 10;
  }
  .close-btn:hover { background: rgba(201,168,76,0.25); }

  /* image strip */
  .img-strip {
    width: 100%;
    height: 200px;
    overflow: hidden;
    position: relative;
    background: #0e0904;
    flex-shrink: 0;
  }
  .img-strip img {
    width: 100%; height: 100%;
    object-fit: cover;
    opacity: 0.85;
    transition: opacity 0.4s;
  }
  .img-strip::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 80px;
    background: linear-gradient(transparent, var(--panel));
  }
  .era-badge {
    position: absolute; bottom: 14px; left: 16px;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    border: 1px solid rgba(201,168,76,0.4);
    padding: 3px 9px;
    background: rgba(14,9,4,0.7);
    backdrop-filter: blur(4px);
    z-index: 2;
  }
  /* img thumbs */
  .img-thumbs {
    display: flex;
    gap: 6px;
    padding: 10px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .img-thumbs::-webkit-scrollbar { display: none; }
  .thumb {
    width: 56px; height: 42px;
    border-radius: 3px;
    overflow: hidden;
    border: 1.5px solid rgba(201,168,76,0.2);
    cursor: pointer;
    flex-shrink: 0;
    transition: border-color 0.2s;
  }
  .thumb.active { border-color: var(--gold); }
  .thumb img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }
  .thumb:hover { border-color: var(--gold2); }

  /* panel content */
  .panel-content { padding: 16px 20px 24px; }
  .site-name {
    font-family: 'Cinzel', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold2);
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .site-loc {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(245,237,224,0.45);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex; align-items: center; gap: 5px;
  }
  .divider {
    height: 1px;
    background: linear-gradient(90deg, rgba(201,168,76,0.4), transparent);
    margin-bottom: 14px;
  }
  .meta-row {
    display: flex; gap: 16px;
    margin-bottom: 14px;
  }
  .meta-item {
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    padding: 7px 11px;
    border-radius: 3px;
    flex: 1;
  }
  .meta-label {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    color: rgba(245,237,224,0.4);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 3px;
  }
  .meta-value {
    font-family: 'Lora', serif;
    font-size: 12px;
    color: var(--gold2);
    font-weight: 500;
  }
  .desc {
    font-size: 13.5px;
    line-height: 1.75;
    color: rgba(245,237,224,0.82);
    margin-bottom: 14px;
  }
  .scholars-title {
    font-family: 'Cinzel', serif;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .scholar-tag {
    display: inline-block;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 3px 8px;
    margin: 3px 3px 3px 0;
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    color: rgba(245,237,224,0.65);
  }

  /* ── HOVER TOOLTIP ── */
  .leaflet-tooltip {
    background: rgba(14,9,4,0.92) !important;
    border: 1px solid rgba(201,168,76,0.4) !important;
    color: var(--gold2) !important;
    font-family: 'Cinzel', serif !important;
    font-size: 12px !important;
    padding: 5px 10px !important;
    border-radius: 2px !important;
    box-shadow: none !important;
  }
  .leaflet-tooltip::before { display: none !important; }

  /* ── WATERMARK ── */
  .wm {
    position: absolute; bottom: 10px; right: 14px;
    font-family: 'Cinzel', serif;
    font-size: 10px;
    color: rgba(201,168,76,0.25);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    z-index: 400;
    pointer-events: none;
  }

  /* ── EMPTY STATE ── */
  .empty-hint {
    position: absolute;
    bottom: 50px; left: 50%;
    transform: translateX(-50%);
    background: rgba(14,9,4,0.85);
    border: 1px solid rgba(201,168,76,0.25);
    padding: 10px 18px;
    border-radius: 2px;
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    color: rgba(245,237,224,0.5);
    letter-spacing: 0.1em;
    pointer-events: none;
    transition: opacity 0.4s;
    white-space: nowrap;
    z-index: 400;
  }
  .empty-hint.hidden { opacity: 0; }
</style>
</head>

  },
  {
    id: 'bandixon',
    name: 'Bandixon (Demetrias)',
    loc: 'Bandixon tumani, Surxondaryo',
    lat: 37.625,
    lng: 67.342,
    era: 'Mil. avv. II — Mil. IV asr',
    type: 'Yunon-Baqtriya shahri',
    typeColor: '#c9a84c',
    maydoni: '~20 gektar',
    davr: 'Yunon-Baqtriya & Kushon',
    emoji: '🏺',
    desc: 'Bandixon antik Demetrias shahrining o\'rni bo\'lib, Yunon-Baqtriya qirolligi davrida muhim savdo va madaniy markaz sifatida faoliyat yuritgan. Bu yerda topilgan yunon tanga-tangalar, sopol idishlar va arxitektura qoldiqlari Ellin madaniyatining chuqur ildiz otganini ko\'rsatadi. Keyinchalik Kushon davrida ham aholi istiqomat qilishda davom etgan.',
    scholars: ['Rtveladze E.V.', 'Pugachenkova G.A.'],
    imgs: [
      'https://images.unsplash.com/photo-1580127985717-5ea5c9d28df4?w=800&q=80',
      'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=400&q=80',
    ],
    fallbackImgs: [
      'https://images.unsplash.com/photo-1580127985717-5ea5c9d28df4?w=800&q=80',
      'https://images.unsplash.com/photo-1547036967-23d11aacaee0?w=400&q=80',
    ]
  }
];

// ─── MAP INIT ───────────────────────────────────────────────────────────────
const map = L.map('map', {
  center: [37.55, 67.55],
  zoom: 9,
  zoomControl: true,
  attributionControl: false
});

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 18,
  attribution: ''
}).addTo(map);

// ─── STATE ───────────────────────────────────────────────────────────────────
let activeMarker = null;
let activeImgIdx = {};

// ─── MARKERS ─────────────────────────────────────────────────────────────────
sites.forEach(site => {
  const iconHtml = `
    <div class="marker-outer" style="background:${site.typeColor}22;border-color:${site.typeColor};" id="mo-${site.id}">
      <div class="marker-inner">${site.emoji}</div>
    </div>`;

  const icon = L.divIcon({
    html: iconHtml,
    className: '',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    popupAnchor: [0, -36]
  });

  const marker = L.marker([site.lat, site.lng], { icon })
    .addTo(map)
    .bindTooltip(site.name, { permanent: false, direction: 'top', offset: [0, -36] });

  marker.on('click', () => openSite(site, marker));
});

// ─── OPEN SITE ───────────────────────────────────────────────────────────────
function openSite(site, marker) {
  document.getElementById('hint').classList.add('hidden');

  if (activeMarker) {
    const prev = document.getElementById('mo-' + activeMarker);
    if (prev) prev.classList.remove('active');
  }
  activeMarker = site.id;
  const mo = document.getElementById('mo-' + site.id);
  if (mo) mo.classList.add('active');

  activeImgIdx[site.id] = 0;

  const allImgs = [...site.imgs];
  // build thumbs
  const thumbsHtml = allImgs.length > 1 ? `
    <div class="img-thumbs">
      ${allImgs.map((src, i) => `
        <div class="thumb ${i === 0 ? 'active' : ''}" onclick="switchImg('${site.id}',${i})" id="thumb-${site.id}-${i}">
          <img src="${src}" onerror="this.src='${site.fallbackImgs[i] || site.fallbackImgs[0]}'" alt="">
        </div>`).join('')}
    </div>` : '';

  const html = `
    <div class="img-strip">
      <img id="mainimg-${site.id}" src="${allImgs[0]}" alt="${site.name}"
        onerror="this.src='${site.fallbackImgs[0]}'">
      <div class="era-badge">${site.era}</div>
    </div>
    ${thumbsHtml}
    <div class="panel-content">
      <div class="site-name">${site.name}</div>
      <div class="site-loc">📍 ${site.loc}</div>
      <div class="divider"></div>
      <div class="meta-row">
        <div class="meta-item">
          <div class="meta-label">Turi</div>
          <div class="meta-value">${site.type}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Davr</div>
          <div class="meta-value">${site.davr}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">Maydon</div>
          <div class="meta-value">${site.maydoni}</div>
        </div>
      </div>
      <p class="desc">${site.desc}</p>
      <div class="scholars-title">Tadqiqotchilar</div>
      <div>${site.scholars.map(s => `<span class="scholar-tag">${s}</span>`).join('')}</div>
    </div>`;

  document.getElementById('panelInner').innerHTML = html;
  document.getElementById('panel').classList.add('open');

  // pan map
  map.panTo([site.lat, site.lng], { animate: true, duration: 0.5 });
}

function switchImg(siteId, idx) {
  const site = sites.find(s => s.id === siteId);
  if (!site) return;
  const allImgs = [...site.imgs];
  const main = document.getElementById('mainimg-' + siteId);
  if (main) {
    main.src = allImgs[idx];
    main.onerror = () => { main.src = site.fallbackImgs[idx] || site.fallbackImgs[0]; };
  }
  // update thumb active
  allImgs.forEach((_, i) => {
    const t = document.getElementById(`thumb-${siteId}-${i}`);
    if (t) t.classList.toggle('active', i === idx);
  });
}

function closePanel() {
  document.getElementById('panel').classList.remove('open');
  if (activeMarker) {
    const mo = document.getElementById('mo-' + activeMarker);
    if (mo) mo.classList.remove('active');
    activeMarker = null;
  }
}

// close on map click
map.on('click', closePanel);
</script>
</body>
</html>
